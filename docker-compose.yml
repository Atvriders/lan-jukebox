# IMPORTANT: This file contains PLACEHOLDER values.
# Before running `docker compose up`, fill in your real values for:
#   PUBLIC_BASE_URL, ALLOWED_WS_ORIGINS (== PUBLIC_BASE_URL), VIEWER_PASSWORD,
#   SESSION_SECRET (>= 32 chars).
# Keep your filled-in copy LOCAL — do NOT commit real secrets to the repo.
#
# Ingress: BRING YOUR OWN. This project does NOT bundle or run a tunnel daemon. The
# jukebox service publishes host port ${HOST_PORT:-3018} on ALL interfaces, so the LAN
# (http://<host-ip>:${HOST_PORT:-3018}) AND your OWN external ingress — a separate
# Cloudflare Tunnel, nginx, Caddy, etc. — can reach it. (To keep it off the LAN and
# reachable only by a same-host tunnel, prefix the ports mapping with 127.0.0.1:.)
#   Alternative: if your tunnel runs as its own container, drop the `ports:` mapping,
#   attach both it and this service to a shared external Docker network, and reach the
#   app at http://jukebox:3018 over that network instead of publishing a host port.
#
# Persistence: the `cache` named volume holds the LRU audio cache AND the restart-safe
#   /data/cache/station-snapshot.json   (current track, queue, upcoming-radio, seed)
#   /data/cache/device-registry.json    (remembered speaker / auto-select state)
# so the station and the remembered speaker survive `docker compose up` restarts.

services:
  jukebox:
    image: ghcr.io/atvriders/lan-jukebox:latest
    pull_policy: always
    # Run a tiny init (tini) as PID 1 so orphaned yt-dlp/ffmpeg grandchildren (yt-dlp forks
    # ffmpeg; a SIGKILLed hung child's own children get reparented to PID 1) are reaped instead
    # of accumulating as <defunct> zombies. Node reaps only its direct children, so on a
    # forever-running station with continuous downloads + timeout-kills, zombies would otherwise
    # creep toward the PID limit.
    init: true
    environment:
      # Server
      PORT: "3018"
      HOST: "0.0.0.0"
      NODE_ENV: "production"
      LOG_LEVEL: "info"

      # Public URL (the https:// example.com subdomain served by the tunnel).
      PUBLIC_BASE_URL: "https://jukebox.example.com"
      # MUST equal PUBLIC_BASE_URL exactly, or the live-updates WebSocket /ws is
      # rejected by the origin guard and the station UI never goes live.
      ALLOWED_WS_ORIGINS: "https://jukebox.example.com"
      # Your external HTTPS proxy / Cloudflare Tunnel terminates TLS at the edge and
      # reaches this origin over plain HTTP, sending X-Forwarded-Proto: https. The app
      # hardcodes Fastify trustProxy:true so it honors that for correct scheme detection
      # + Secure session cookies + real client IP — there is no trust-proxy env knob.

      # Auth: a single shared viewer password (required). Anyone authenticated may
      # control everything — there is no second/admin password. The server refuses to
      # start without VIEWER_PASSWORD unless ALLOW_NO_PASSWORD=true.
      VIEWER_PASSWORD: "CHANGE_ME"
      ALLOW_NO_PASSWORD: "false"
      SESSION_SECRET: "CHANGE_ME_AT_LEAST_32_CHARACTERS_LONG"

      # Cache + persistence (all three persisted files live under CACHE_DIR)
      CACHE_DIR: "/data/cache"
      CACHE_MAX_MB: "5000"

      # History / search limits
      HISTORY_MAX_ITEMS: "100"
      SEARCH_RESULT_COUNT: "10"

      # Download / radio tuning
      PREFETCH_DEPTH: "3"
      MAX_TRANSCODE_JOBS: "4"
      # 0 / "" = no cap; long content (concerts) plays out of the box.
      MAX_TRACK_DURATION_SEC: "0"
      # Caps ONLY radio auto-discovery: the engine skips autoplay candidates longer than
      # this many seconds (0 = no cap). User-requested tracks are NEVER capped by this.
      # Unset defaults to 900 (15 min).
      # RADIO_MAX_AUTOPLAY_SEC: "900"

      # YouTube extraction
      YT_PROXY: "" # optional residential/SOCKS proxy if your IP gets blocked
      YT_COOKIES: "" # optional path to a MOUNTED cookies.txt (takes precedence over YT_COOKIES_TEXT)
      # Paste YouTube cookies here to fix "Sign in to confirm you're not a bot" on flagged IPs.
      # It is written to <cache>/yt-cookies.txt (0600) at startup — no file mount needed.
      # Easiest: a one-line browser "Cookie:" header (DevTools → Network → any youtube.com
      # request → Request Headers → cookie), e.g.:
      #   YT_COOKIES_TEXT: "VISITOR_INFO1_LIVE=...; LOGIN_INFO=...; SID=...; HSID=...; SSID=..."
      # Or a full exported cookies.txt as a YAML block scalar:
      #   YT_COOKIES_TEXT: |
      #     # Netscape HTTP Cookie File
      #     .youtube.com	TRUE	/	TRUE	2000000000	SID	<value>
      YT_COOKIES_TEXT: ""
      # Zero-PO-token clients — reliable on most hosts. Only switch to "web,mweb" if
      # you also run the bgutil sidecar (`--profile pot`) and set PO_TOKEN_PROVIDER_URL;
      # otherwise those clients silently fail to extract audio.
      YT_PLAYER_CLIENTS: "android_vr,web_embedded,tv"
      PO_TOKEN_PROVIDER_URL: "" # only set (e.g. http://bgutil-pot:4416) with --profile pot
      # SponsorBlock segments yt-dlp strips from downloaded audio (CSV of categories).
      # Unset uses the music-focused default shown below; set "off" to disable entirely.
      # YT_SPONSORBLOCK: "music_offtopic,intro,outro,sponsor,selfpromo,preview,interaction"
    # Published on ALL host interfaces so the LAN (http://<host-ip>:3018) AND your OWN
    # external ingress (a separate tunnel / nginx / Caddy) can reach it. Override the
    # host port with HOST_PORT. To keep it OFF the LAN (only a same-host tunnel reaches
    # it), prefix the mapping with 127.0.0.1: e.g. "127.0.0.1:${HOST_PORT:-3018}:3018".
    # Alternative: if your tunnel is its own container, delete this line and instead
    # join a shared external network and reach the app at http://jukebox:3018.
    ports: ["${HOST_PORT:-3018}:3018"]
    volumes: ["cache:/data/cache"]
    # Memory ceiling so a burst of parallel yt-dlp/ffmpeg jobs (PREFETCH_DEPTH x
    # MAX_TRANSCODE_JOBS) can't OOM-kill the host on a small VPS. 1g is ample for
    # audio-only extraction/transcode; if you still get OOM-killed mid-song (the
    # container restarts and resumes), lower PREFETCH_DEPTH / MAX_TRANSCODE_JOBS
    # above and/or raise this limit.
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||3018)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Optional PO-token sidecar — only needed if you switch YT_PLAYER_CLIENTS to web/mweb.
  # Enable with: docker compose --profile pot up -d
  bgutil-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    profiles: ["pot"]
    # Reap any grandchildren the provider spawns (same PID-1 zombie concern as jukebox).
    init: true
    restart: unless-stopped
    expose: ["4416"]

volumes:
  cache:
