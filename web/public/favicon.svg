<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="LAN Jukebox">
  <defs>
    <radialGradient id="face" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#241d1e"/>
      <stop offset="1" stop-color="#0a0809"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="0.55" stop-color="#ff2a00"/>
      <stop offset="1" stop-color="#ff0000"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- console faceplate -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="7.5" fill="url(#face)" stroke="#43383a" stroke-width="1"/>
  <!-- VU / equalizer bars (bottoms aligned), backlit -->
  <g filter="url(#glow)">
    <rect x="8.6"  y="14.5" width="3.4" height="11.5" rx="1.3" fill="url(#bar)"/>
    <rect x="14.3" y="8.5"  width="3.4" height="17.5" rx="1.3" fill="url(#bar)"/>
    <rect x="20.0" y="12.5" width="3.4" height="13.5" rx="1.3" fill="url(#bar)"/>
  </g>
</svg>
